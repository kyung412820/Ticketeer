apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketeer-backend-config
  namespace: ticketeer
data:
  APP_ENV: "k8s"
  APP_PORT: "8080"
  POSTGRES_HOST: "ticketeer-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "ticketeer"
  REDIS_HOST: "ticketeer-redis"
  REDIS_PORT: "6379"
  CORS_ALLOW_ORIGIN: "http://localhost:3000"
  TZ: "Asia/Seoul"
